# Operational data-extraction scripts are validated via syntax/runtime checks, not
# the repository's current test coverage pipeline, so exclude them from Sonar
# coverage gating until dedicated script coverage is wired in CI.
sonar.coverage.exclusions=scripts/extract-tz-preferences.py


