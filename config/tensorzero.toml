# ─── Models ──────────────────────────────────────────────────────────────────
# Local HPC endpoints use OpenAI-compatible protocol (llama.cpp).
# Cloud endpoints use CLIAPIProxy on ai-proxy (localhost from host network).
#
# Gateway runs with network_mode: host so it can reach vasp nodes directly
# by IP and CLIAPIProxy on localhost:8317.
#
# Cluster layout (active — 3-model A/B experiment):
#   vasp-01:8081 — Qwen3.5-27B Q4_K_M (coder champion, ~27 tok/s, SWE-bench 72.4%)
#   vasp-02:8081 — Devstral-Small-2-24B Q4_K_M (TZ #1 bool_pass, ~30 tok/s, SWE-bench 68.0%)
#   vasp-03:8081 — GLM-4.7-Flash Q4_K_M (SOTA tool-calling, 3B active, ~50 tok/s, tau2 84.7)
#   vasp-*:8082  — nomic-embed-text-v1.5 (CPU embedding service, all nodes)
#
# Active A/B: glm_flash vs qwen35_27b vs devstral_24b (Thompson Sampling on task_resolved).

# --- Scout/fast tier on vasp-03 (GLM-4.7-Flash, SOTA tool-calling) ---

[models.qwen_fast]
routing = ["vasp03"]

[models.qwen_fast.providers.vasp03]
type = "openai"
model_name = "GLM-4.7-Flash"
api_base = "http://10.0.0.22:8081/v1"
api_key_location = "none"

# --- Coder tier on vasp-01 (Qwen3.5-27B dense — current champion) ---

[models.qwen_coder]
routing = ["vasp01"]

[models.qwen_coder.providers.vasp01]
type = "openai"
model_name = "Qwen3.5-27B"
api_base = "http://10.0.0.20:8081/v1"
api_key_location = "none"

# --- Challenger: Devstral Small 2 24B on vasp-02 (Mistral agentic coding) ---

[models.devstral]
routing = ["vasp02"]

[models.devstral.providers.vasp02]
type = "openai"
model_name = "Devstral-Small-2-24B"
api_base = "http://10.0.0.21:8081/v1"
api_key_location = "none"

# --- Reasoning tier: alias to Devstral (same node, replaces duplicate 27B) ---

[models.qwen_reasoning]
routing = ["vasp02_reasoning"]

[models.qwen_reasoning.providers.vasp02_reasoning]
type = "openai"
model_name = "Devstral-Small-2-24B"
api_base = "http://10.0.0.21:8081/v1"
api_key_location = "none"

# --- SERA-14B SWE specialist: Allen AI model on Qwen3 backbone, vasp-03:8083 ---
# Shares vasp-03 GPU with GLM-4.7-Flash. 8K context (VRAM-constrained).
# Re-added per Autopilot analysis: 77.4% task_resolved (worker, n=944),
# 92.1% task_resolved (fixer, n=165) — best fixer in the fleet.

# SERA-14B tries vasp-03:8083 first (8K context). When prompt exceeds 8K,
# falls through to Qwen3.5-27B on vasp-01 (32K context) as a safety net.
[models.sera_14b]
routing = ["vasp03_sera", "vasp01_fallback"]

[models.sera_14b.providers.vasp03_sera]
type = "openai"
model_name = "SERA-14B-RustV1"
api_base = "http://10.0.0.22:8083/v1"
api_key_location = "none"

[models.sera_14b.providers.vasp01_fallback]
type = "openai"
model_name = "Qwen3.5-27B"
api_base = "http://10.0.0.20:8081/v1"
api_key_location = "none"

# --- OmniCoder-9B on vasp-02:8083 (secondary, alongside Devstral-24B on :8081) ---
# Dense 9B model, GPU-resident. Historical task_resolved ≈ 0.753 (worker, n=2742).
# Originally ran on vasp-03:8081 before GLM-4.7-Flash replaced it. Now secondary on vasp-02.

[models.omnicoder]
routing = ["vasp02_omnicoder"]

[models.omnicoder.providers.vasp02_omnicoder]
type = "openai"
model_name = "OmniCoder-9B"
api_base = "http://10.0.0.21:8083/v1"
api_key_location = "none"

# --- Gemma-4-31B-it on vasp-02:8081 (time-sliced experiment, replaces Devstral) ---
# Dense 30.7B model, 256K context, Google. Q4_K_M ~19.6GB — exclusive use of V100S.
# NOT always running. Swap in via: scripts/experiment-gemma-swap.sh start

[models.gemma_31b]
routing = ["vasp02_gemma"]

[models.gemma_31b.providers.vasp02_gemma]
type = "openai"
model_name = "gemma-4-31B-it"
api_base = "http://10.0.0.21:8081/v1"
api_key_location = "none"

# --- Strand-Rust-Coder-14B on vasp-02:8080 (SLURM job, time-sliced) ---
# SWE-trained 14B Rust specialist. Q8_0 ~15GB. Shares vasp-02 with Devstral.
# NOT always running. Start via: sbatch inference/slurm/run-strand-rust-coder.slurm

[models.strand_rust_14b]
routing = ["vasp02_strand"]

[models.strand_rust_14b.providers.vasp02_strand]
type = "openai"
model_name = "Strand-Rust-Coder"
api_base = "http://10.0.0.21:8080/v1"
api_key_location = "none"

# --- Cloud models (via CLIAPIProxy on ai-proxy localhost) ---

[models.claude_opus]
routing = ["cliapiproxy", "cliapiproxy_gemini_flash_fallback"]

[models.claude_opus.providers.cliapiproxy]
type = "openai"
model_name = "claude-opus-4-6"
api_base = "http://localhost:8317/v1"
api_key_location = "env::SWARM_CLOUD_API_KEY"

# Gemini Flash fallback: TZ automatically tries this when Anthropic rate-limits
