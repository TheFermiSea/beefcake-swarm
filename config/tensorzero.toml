# TensorZero Gateway Configuration for Beefcake Swarm
#
# Maps swarm agent roles to TensorZero functions with variants.
# Each function represents a distinct inference task in the swarm pipeline.
# Variants enable A/B testing different models and prompts.
#
# Deployment: runs on ai-proxy (port 3000) alongside CLIAPIProxy (port 8317).
# See infrastructure/tensorzero/docker-compose.yml for the Docker stack.

[gateway]
bind_address = "[::]:3000"

# ─── Metrics ─────────────────────────────────────────────────────────────────
# Feedback signals linked to inference outcomes for optimization.

[metrics.task_resolved]
type = "boolean"
optimize = "max"
level = "episode"

[metrics.verifier_pass]
type = "boolean"
optimize = "max"
level = "inference"

[metrics.iterations_used]
type = "float"
optimize = "min"
level = "episode"

[metrics.wall_time_seconds]
type = "float"
optimize = "min"
level = "episode"

[metrics.edit_accuracy]
type = "float"
optimize = "max"
level = "inference"

# ─── Models ──────────────────────────────────────────────────────────────────
# Local HPC endpoints use OpenAI-compatible protocol (llama.cpp).
# All 3 nodes run Qwen3.5-397B-A17B (Q4_K_M, --parallel 2 each).
# Cloud endpoints use CLIAPIProxy on ai-proxy (localhost from host network).
#
# Gateway runs with network_mode: host so it can reach vasp nodes directly
# by IP and CLIAPIProxy on localhost:8317.

# --- Local HPC models (Qwen3.5-397B-A17B on V100S cluster) ---

[models.qwen_fast]
routing = ["vasp03"]

[models.qwen_fast.providers.vasp03]
type = "openai"
model_name = "Qwen3.5-397B-A17B"
api_base = "http://10.0.0.22:8081/v1"
api_key_location = "none"

[models.qwen_coder]
routing = ["vasp01"]

[models.qwen_coder.providers.vasp01]
type = "openai"
model_name = "Qwen3.5-397B-A17B"
api_base = "http://10.0.0.20:8081/v1"
api_key_location = "none"

[models.qwen_reasoning]
routing = ["vasp02"]

[models.qwen_reasoning.providers.vasp02]
type = "openai"
model_name = "Qwen3.5-397B-A17B"
api_base = "http://10.0.0.21:8081/v1"
api_key_location = "none"

# --- Cloud models (via CLIAPIProxy on ai-proxy localhost) ---

[models.claude_opus]
routing = ["cliapiproxy"]

[models.claude_opus.providers.cliapiproxy]
type = "openai"
model_name = "claude-opus-4-6"
api_base = "http://localhost:8317/v1"
api_key_location = "env::SWARM_CLOUD_API_KEY"

[models.claude_sonnet]
routing = ["cliapiproxy_sonnet"]

[models.claude_sonnet.providers.cliapiproxy_sonnet]
type = "openai"
model_name = "claude-sonnet-4-6"
api_base = "http://localhost:8317/v1"
api_key_location = "env::SWARM_CLOUD_API_KEY"

[models.gemini_pro]
routing = ["cliapiproxy_gemini"]

[models.gemini_pro.providers.cliapiproxy_gemini]
type = "openai"
model_name = "gemini-3.1-pro-high"
api_base = "http://localhost:8317/v1"
api_key_location = "env::SWARM_CLOUD_API_KEY"

# ─── Functions ───────────────────────────────────────────────────────────────
# Each function maps to a distinct inference task in the swarm pipeline.

# --- Cloud Manager: decomposes tasks, delegates to workers ---
# No user_schema: Rig sends raw OpenAI chat messages, not template variables.
# Templates below are kept for future GEPA via /inference but ignored by /openai/v1.
[functions.cloud_manager_delegation]
type = "chat"

[functions.cloud_manager_delegation.variants.opus_primary]
type = "chat_completion"
model = "claude_opus"
system_template = "functions/cloud_manager_delegation/opus_primary/system_template.minijinja"
user_template = "functions/cloud_manager_delegation/opus_primary/user_template.minijinja"

# --- Architect: reads codebase, produces SEARCH/REPLACE plans ---
# No user_schema: same reason as cloud_manager_delegation.
[functions.architect_plan]
type = "chat"

[functions.architect_plan.variants.opus_verbose]
type = "chat_completion"
model = "claude_opus"
system_template = "functions/architect_plan/opus_verbose/system_template.minijinja"
user_template = "functions/architect_plan/opus_verbose/user_template.minijinja"

# A/B test: concise variant with stripped-down prompt
[functions.architect_plan.variants.opus_concise]
type = "chat_completion"
model = "claude_opus"
system_template = "functions/architect_plan/opus_concise/system_template.minijinja"
user_template = "functions/architect_plan/opus_concise/user_template.minijinja"

# 50/50 split between verbose and concise Architect prompts
[functions.architect_plan.experimentation]
type = "static"
candidate_variants = { "opus_verbose" = 0.5, "opus_concise" = 0.5 }

# --- Editor: applies Architect's SEARCH/REPLACE blocks mechanically ---
[functions.editor_apply]
type = "chat"
user_schema = "functions/editor_apply/user_schema.json"

[functions.editor_apply.variants.qwen_editor]
type = "chat_completion"
model = "qwen_fast"
system_template = "functions/editor_apply/qwen_editor/system_template.minijinja"
user_template = "functions/editor_apply/qwen_editor/user_template.minijinja"

# --- Worker Code Edit: Rust specialist and general coder ---
[functions.worker_code_edit]
type = "chat"
user_schema = "functions/worker_code_edit/user_schema.json"

[functions.worker_code_edit.variants.qwen_rust_coder]
type = "chat_completion"
model = "qwen_fast"
system_template = "functions/worker_code_edit/qwen_rust_coder/system_template.minijinja"
user_template = "functions/worker_code_edit/qwen_rust_coder/user_template.minijinja"

[functions.worker_code_edit.variants.qwen_general_coder]
type = "chat_completion"
model = "qwen_coder"
system_template = "functions/worker_code_edit/qwen_general_coder/system_template.minijinja"
user_template = "functions/worker_code_edit/qwen_general_coder/user_template.minijinja"

# --- Code Review: blind reviewer ---
[functions.code_review]
type = "json"
user_schema = "functions/code_review/user_schema.json"
output_schema = "functions/code_review/output_schema.json"

[functions.code_review.variants.qwen_reviewer]
type = "chat_completion"
model = "qwen_fast"
system_template = "functions/code_review/qwen_reviewer/system_template.minijinja"
user_template = "functions/code_review/qwen_reviewer/user_template.minijinja"
json_mode = "on"

# --- Deep Reasoning: complex analysis ---
[functions.deep_reasoning]
type = "chat"
user_schema = "functions/deep_reasoning/user_schema.json"

[functions.deep_reasoning.variants.qwen_122b]
type = "chat_completion"
model = "qwen_reasoning"
system_template = "functions/deep_reasoning/qwen_122b/system_template.minijinja"
user_template = "functions/deep_reasoning/qwen_122b/user_template.minijinja"

# --- Task Planning: read-only analysis, structured repair plans ---
[functions.task_planning]
type = "json"
user_schema = "functions/task_planning/user_schema.json"
output_schema = "functions/task_planning/output_schema.json"

[functions.task_planning.variants.qwen_planner]
type = "chat_completion"
model = "qwen_coder"
system_template = "functions/task_planning/qwen_planner/system_template.minijinja"
user_template = "functions/task_planning/qwen_planner/user_template.minijinja"
json_mode = "on"

# --- Code Fixing: takes a plan and implements it ---
[functions.code_fixing]
type = "chat"
user_schema = "functions/code_fixing/user_schema.json"

[functions.code_fixing.variants.qwen_fixer]
type = "chat_completion"
model = "qwen_fast"
system_template = "functions/code_fixing/qwen_fixer/system_template.minijinja"
user_template = "functions/code_fixing/qwen_fixer/user_template.minijinja"

# --- Adversarial Testing: red-team agent ---
[functions.adversarial_test]
type = "json"
user_schema = "functions/adversarial_test/user_schema.json"
output_schema = "functions/adversarial_test/output_schema.json"

[functions.adversarial_test.variants.qwen_breaker]
type = "chat_completion"
model = "qwen_fast"
system_template = "functions/adversarial_test/qwen_breaker/system_template.minijinja"
user_template = "functions/adversarial_test/qwen_breaker/user_template.minijinja"
json_mode = "on"
