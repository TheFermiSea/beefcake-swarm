# TensorZero Gateway Configuration for Beefcake Swarm
#
# Maps swarm agent roles to TensorZero functions with variants.
# Each function represents a distinct inference task in the swarm pipeline.
# Variants enable A/B testing different models and prompts.
#
# Deployment: runs on ai-proxy (port 3000) alongside CLIAPIProxy (port 8317).
# See infrastructure/tensorzero/docker-compose.yml for the Docker stack.

[gateway]
bind_address = "[::]:3000"

# ─── Metrics ─────────────────────────────────────────────────────────────────
# Feedback signals linked to inference outcomes for optimization.

[metrics.task_resolved]
type = "boolean"
optimize = "max"
level = "episode"

[metrics.verifier_pass]
type = "boolean"
optimize = "max"
level = "inference"

[metrics.iterations_used]
type = "float"
optimize = "min"
level = "episode"

[metrics.wall_time_seconds]
type = "float"
optimize = "min"
level = "episode"

[metrics.edit_accuracy]
type = "float"
optimize = "max"
level = "inference"

[metrics.verifier_gates_passed]
type = "float"
optimize = "max"
level = "episode"

[metrics.iteration_efficiency]
type = "float"
optimize = "min"
level = "episode"

# ─── Evaluations ─────────────────────────────────────────────────────────────
# Offline evaluations that compare variant performance on curated datasets.
# Create datasets via the UI (http://localhost:4000/datasets/builder),
# then run evaluations via CLI or UI.

# Evaluate worker code edit quality across model variants.
[evaluations.worker_code_quality]
type = "inference"
function_name = "worker_code_edit"
description = "Evaluates whether worker code edits are correct, compilable, and minimal."

[evaluations.worker_code_quality.evaluators.code_correctness]
type = "llm_judge"
output_type = "float"
optimize = "max"

[evaluations.worker_code_quality.evaluators.code_correctness.variants.claude_judge]
active = true
type = "chat_completion"
model = "claude_sonnet"
system_instructions = "evaluations/worker_code_quality/code_correctness/system_instructions.txt"
json_mode = "strict"

# Check that workers actually use edit_file/write_file tools (not just read).
[evaluations.worker_code_quality.evaluators.uses_edit_tools]
type = "tool_use"
behavior = "any_of"
tools = ["edit_file", "write_file", "proxy_edit_file", "proxy_write_file"]

# Evaluate manager delegation quality across Opus vs Sonnet.
[evaluations.manager_delegation]
type = "inference"
function_name = "cloud_manager_delegation"
description = "Evaluates whether the cloud manager delegates effectively to workers."

[evaluations.manager_delegation.evaluators.delegation_quality]
type = "llm_judge"
output_type = "float"
optimize = "max"

[evaluations.manager_delegation.evaluators.delegation_quality.variants.claude_judge]
active = true
type = "chat_completion"
model = "claude_sonnet"
system_instructions = "evaluations/manager_delegation/delegation_quality/system_instructions.txt"
json_mode = "strict"

# Evaluate code fixing quality (fixer agent after verifier failure).
[evaluations.code_fixing_quality]
type = "inference"
function_name = "code_fixing"
description = "Evaluates whether the fixer agent successfully resolves compilation errors."

[evaluations.code_fixing_quality.evaluators.uses_edit_tools]
type = "tool_use"
behavior = "any_of"
tools = ["edit_file", "write_file", "proxy_edit_file", "proxy_write_file"]

# ─── Models ──────────────────────────────────────────────────────────────────
# Local HPC endpoints use OpenAI-compatible protocol (llama.cpp).
# Cloud endpoints use CLIAPIProxy on ai-proxy (localhost from host network).
#
# Gateway runs with network_mode: host so it can reach vasp nodes directly
# by IP and CLIAPIProxy on localhost:8317.
#
# Cluster layout (active — 3-model A/B experiment):
#   vasp-01:8081 — Qwen3.5-27B Q4_K_M (coder champion, ~27 tok/s, SWE-bench 72.4%)
#   vasp-02:8081 — Devstral-Small-2-24B Q4_K_M (TZ #1 bool_pass, ~30 tok/s, SWE-bench 68.0%)
#   vasp-03:8081 — GLM-4.7-Flash Q4_K_M (SOTA tool-calling, 3B active, ~50 tok/s, tau2 84.7)
#   vasp-03:8083 — SERA-14B (Qwen3 backbone, 8K ctx; defined but not in A/B rotation — shared VRAM)
#   vasp-*:8082  — nomic-embed-text-v1.5 (CPU embedding service, all nodes)
#
# Active A/B: glm_flash vs qwen35_27b vs devstral_24b (Thompson Sampling on task_resolved).
# SERA-14B removed from candidate_variants: 8K context cap, shared GPU with GLM on vasp-03.
# DICL removed entirely: no demonstrations seeded; TZ validates ALL defined variants,
# so keeping DICL variant definitions caused startup failures on TZ 2026.3.2.

# --- Scout/fast tier on vasp-03 (GLM-4.7-Flash, SOTA tool-calling) ---

[models.qwen_fast]
routing = ["vasp03"]

[models.qwen_fast.providers.vasp03]
type = "openai"
model_name = "GLM-4.7-Flash"
api_base = "http://10.0.0.22:8081/v1"
api_key_location = "none"

# --- Coder tier on vasp-01 (Qwen3.5-27B dense — current champion) ---

[models.qwen_coder]
routing = ["vasp01"]

[models.qwen_coder.providers.vasp01]
type = "openai"
model_name = "Qwen3.5-27B"
api_base = "http://10.0.0.20:8081/v1"
api_key_location = "none"

# --- Challenger: Devstral Small 2 24B on vasp-02 (Mistral agentic coding) ---

[models.devstral]
routing = ["vasp02"]

[models.devstral.providers.vasp02]
type = "openai"
model_name = "Devstral-Small-2-24B"
api_base = "http://10.0.0.21:8081/v1"
api_key_location = "none"

# --- SWE specialist: SERA-14B on vasp-03 port 8083 ---
# Allen AI's SERA-14B: Qwen3 backbone, SFT on synthetic SWE trajectories (SVG method).
# 8K context (VRAM-constrained, shares GPU with GLM-4.7-Flash on 8081).
# A/B test: purpose-built SWE agent vs general coder models.

[models.sera_14b]
routing = ["vasp03_sera"]

[models.sera_14b.providers.vasp03_sera]
type = "openai"
model_name = "SERA-14B"
api_base = "http://10.0.0.22:8083/v1"
api_key_location = "none"

# --- Reasoning tier: alias to Devstral (same node, replaces duplicate 27B) ---

[models.qwen_reasoning]
routing = ["vasp02_reasoning"]

[models.qwen_reasoning.providers.vasp02_reasoning]
type = "openai"
model_name = "Devstral-Small-2-24B"
api_base = "http://10.0.0.21:8081/v1"
api_key_location = "none"

# --- Cloud models (via CLIAPIProxy on ai-proxy localhost) ---

[models.claude_opus]
routing = ["cliapiproxy"]

[models.claude_opus.providers.cliapiproxy]
type = "openai"
model_name = "claude-opus-4-6"
api_base = "http://localhost:8317/v1"
api_key_location = "env::SWARM_CLOUD_API_KEY"

[models.claude_sonnet]
routing = ["cliapiproxy_sonnet"]

[models.claude_sonnet.providers.cliapiproxy_sonnet]
type = "openai"
model_name = "claude-sonnet-4-6"
api_base = "http://localhost:8317/v1"
api_key_location = "env::SWARM_CLOUD_API_KEY"

[models.gemini_pro]
routing = ["cliapiproxy_gemini"]

[models.gemini_pro.providers.cliapiproxy_gemini]
type = "openai"
model_name = "gemini-3.1-pro-high"
api_base = "http://localhost:8317/v1"
api_key_location = "env::SWARM_CLOUD_API_KEY"

# ─── Functions ───────────────────────────────────────────────────────────────
# Each function maps to a distinct inference task in the swarm pipeline.

# --- Cloud Manager: decomposes tasks, delegates to workers ---
[functions.cloud_manager_delegation]
type = "chat"

[functions.cloud_manager_delegation.variants.opus_primary]
type = "chat_completion"
model = "claude_opus"

# --- Architect: reads codebase, produces SEARCH/REPLACE plans ---
[functions.architect_plan]
type = "chat"

[functions.architect_plan.variants.opus_verbose]
type = "chat_completion"
model = "claude_opus"

# A/B test: concise variant routes to Sonnet for cost comparison
[functions.architect_plan.variants.sonnet_concise]
type = "chat_completion"
model = "claude_sonnet"

# Adaptive: TZ shifts traffic to the variant that maximizes task_resolved.
[functions.architect_plan.experimentation]
type = "adaptive"
candidate_variants = ["opus_verbose", "sonnet_concise"]
metric = "task_resolved"
update_period_s = 300

# --- Editor: applies Architect's SEARCH/REPLACE blocks ---
# A/B test between vasp-01 (coder) and vasp-02 (reasoning) — same model,
# different node. Tests whether load balancing or sticky routing is better.
[functions.editor_apply]
type = "chat"

[functions.editor_apply.variants.qwen_coder]
type = "chat_completion"
model = "qwen_coder"

[functions.editor_apply.variants.qwen_reasoning]
type = "chat_completion"
model = "qwen_reasoning"

[functions.editor_apply.experimentation]
type = "adaptive"
candidate_variants = ["qwen_coder", "qwen_reasoning"]
metric = "task_resolved"
update_period_s = 300

# --- Worker Code Edit: 3-model A/B experiment ---
# GLM-4.7-Flash (scout/fast), Qwen3.5-27B (coder), Devstral-24B (reasoning)
# Thompson Sampling routes toward the model that maximizes task_resolved.
# SERA-14B removed: shares GPU with GLM-4.7-Flash (VRAM contention), 8K context limit.
# DICL removed: 0 inferences in 3 days (no demonstrations seeded). TZ 2026.3.2
# validates ALL defined variants at startup — keeping the definition causes crashes.
[functions.worker_code_edit]
type = "chat"

[functions.worker_code_edit.variants.glm_flash]
type = "chat_completion"
model = "qwen_fast"

[functions.worker_code_edit.variants.qwen35_27b]
type = "chat_completion"
model = "qwen_coder"

[functions.worker_code_edit.variants.devstral_24b]
type = "chat_completion"
model = "devstral"

# Adaptive: TZ routes via Thompson Sampling across the 3 dedicated-GPU models.
[functions.worker_code_edit.experimentation]
type = "adaptive"
candidate_variants = ["glm_flash", "qwen35_27b", "devstral_24b"]
metric = "task_resolved"
update_period_s = 300

# --- Code Review: blind reviewer ---
[functions.code_review]
type = "chat"

[functions.code_review.variants.qwen_reviewer]
type = "chat_completion"
model = "qwen_fast"

# --- Deep Reasoning: complex analysis ---
# Routes to vasp-02 (Devstral-24B) for reasoning-heavy tasks.
[functions.deep_reasoning]
type = "chat"

[functions.deep_reasoning.variants.qwen_27b]
type = "chat_completion"
model = "qwen_reasoning"

# --- Task Planning: structured repair plans ---
# A/B test: fast planning on GLM-4.7-Flash vs thorough planning on 27B.
[functions.task_planning]
type = "chat"

[functions.task_planning.variants.qwen_fast_planner]
type = "chat_completion"
model = "qwen_fast"

[functions.task_planning.variants.qwen_planner]
type = "chat_completion"
model = "qwen_coder"

[functions.task_planning.experimentation]
type = "adaptive"
candidate_variants = ["qwen_fast_planner", "qwen_planner"]
metric = "task_resolved"
update_period_s = 300

# --- Code Fixing: 4-model autoresearch for error fixing ---
[functions.code_fixing]
type = "chat"

[functions.code_fixing.variants.glm_flash_fixer]
type = "chat_completion"
model = "qwen_fast"

[functions.code_fixing.variants.qwen35_fixer]
type = "chat_completion"
model = "qwen_coder"

[functions.code_fixing.variants.devstral_fixer]
type = "chat_completion"
model = "devstral"

# SERA-14B fixer removed (same structural disadvantages as sera_14b_worker).
[functions.code_fixing.experimentation]
type = "adaptive"
candidate_variants = ["glm_flash_fixer", "qwen35_fixer", "devstral_fixer"]
metric = "task_resolved"
update_period_s = 300

# --- Adversarial Testing: red-team agent ---
[functions.adversarial_test]
type = "chat"

[functions.adversarial_test.variants.qwen_breaker]
type = "chat_completion"
model = "qwen_coder"

# ─── Embedding Models (archived — nomic-embed for future DICL) ───────────────
# nomic-embed-text-v1.5 runs on CPU across all vasp nodes (port 8082).
# Used by DICL for semantic similarity retrieval of past successful fixes.
# DICL variants removed from functions: TZ validates all defined variants even
# if not in candidate_variants, and embedding model validation was failing.
# Re-add DICL variants once demonstrations are seeded (see scripts/setup-dicl.py).

[models.nomic_embed]
routing = ["vasp_embed"]

[models.nomic_embed.providers.vasp_embed]
type = "openai"
model_name = "nomic-embed-text-v1.5"
api_base = "http://10.0.0.22:8082/v1"
api_key_location = "none"
