# ─── Harness Parameter Optimization (Tag-Based Thompson Sampling) ───────────
#
# Optimizes harness parameters (write_deadline, search_unlock_turn,
# pre_write_read_budget) via TZ Autopilot's tag-based correlation analysis.
#
# TZ's adaptive experimentation requires chat_completion variants backed by
# real LLM models — there is no "static template" variant type for returning
# parameter JSON without inference. Instead, we use the tag-based approach:
#
#   1. Rust-side defines 4 parameter presets (very_tight/tight/medium/loose)
#      as constants in tensorzero.rs → HarnessPreset.
#   2. At episode start, the orchestrator selects a preset using weighted
#      random selection (initial: uniform; updated by Autopilot insights).
#   3. The selected preset name is recorded in the `harness_preset` feedback
#      tag alongside the individual parameter values (write_deadline,
#      search_unlock_turn, pre_write_read_budget).
#   4. TZ Autopilot correlates harness_preset × task_resolved to recommend
#      optimal parameter combinations — same optimization loop as model
#      variant routing, but driven by tag segmentation instead of
#      function-level variant selection.
#
# Preset definitions (see tensorzero.rs HarnessPreset for authoritative values):
#   very_tight — write_deadline=3, search_unlock_turn=1, pre_write_read_budget=5
#   tight      — write_deadline=4, search_unlock_turn=2, pre_write_read_budget=6
#   medium     — write_deadline=6, search_unlock_turn=3, pre_write_read_budget=8
#   loose      — write_deadline=10, search_unlock_turn=4, pre_write_read_budget=12
#
# Source: gyc567/AutoHarness — tree search + Thompson sampling for harness
# synthesis achieves convergence in ~14.5 iterations.

# ─── Embedding Models (archived — nomic-embed for future DICL) ───────────────
# nomic-embed-text-v1.5 runs on CPU across all vasp nodes (port 8082).
# Used by DICL for semantic similarity retrieval of past successful fixes.
# DICL variants removed from functions: TZ validates all defined variants even
# if not in candidate_variants, and embedding model validation was failing.
# Re-add DICL variants once demonstrations are seeded (see scripts/setup-dicl.py).

[models.nomic_embed]
routing = ["vasp_embed"]

[models.nomic_embed.providers.vasp_embed]
type = "openai"
model_name = "nomic-embed-text-v1.5"
api_base = "http://10.0.0.22:8082/v1"
api_key_location = "none"
