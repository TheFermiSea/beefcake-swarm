# TensorZero Gateway Configuration for Beefcake Swarm
#
# Maps swarm agent roles to TensorZero functions with variants.
# Each function represents a distinct inference task in the swarm pipeline.
# Variants enable A/B testing different models and prompts.
#
# Deployment: runs on ai-proxy (port 3000) alongside CLIAPIProxy (port 8317).
# See infrastructure/tensorzero/docker-compose.yml for the Docker stack.

[gateway]
bind_address = "[::]:3000"

# ─── Metrics ─────────────────────────────────────────────────────────────────
# Feedback signals linked to inference outcomes for optimization.

[metrics.task_resolved]
type = "boolean"
optimize = "max"
level = "episode"

[metrics.verifier_pass]
type = "boolean"
optimize = "max"
level = "inference"

[metrics.iterations_used]
type = "float"
optimize = "min"
level = "episode"

[metrics.wall_time_seconds]
type = "float"
optimize = "min"
level = "episode"

[metrics.edit_accuracy]
type = "float"
optimize = "max"
level = "inference"

[metrics.verifier_gates_passed]
type = "float"
optimize = "max"
level = "episode"

[metrics.iteration_efficiency]
type = "float"
optimize = "min"
level = "episode"

# ─── Harness Parameter Tags (Meta-Harness) ─────────────────────────────────
# Tags submitted with worker_code_edit episodes for Autopilot correlation:
#   harness_preset: Selected preset name (very_tight/tight/medium/loose)
#   write_deadline: Base write deadline value used for this episode
#   search_unlock_turn: Turn after which search tools are unlocked
#   pre_write_read_budget: Max consecutive read-only calls before termination
#   max_tool_calls: Maximum tool calls per worker session
#   retry_tier: Retry tier routing decision (fast/coder)
# These enable Autopilot to correlate harness settings with outcomes
# (made_edit, first_edit_early, avoids_exploration_loop) and suggest
# optimal parameter combinations via tag-based segmentation.

# ─── Evaluations ─────────────────────────────────────────────────────────────
# Offline evaluations that compare variant performance on curated datasets.
# Create datasets via the UI (http://localhost:4000/datasets/builder),
# then run evaluations via CLI or UI.

# Evaluate worker code edit quality across model variants.
[evaluations.worker_code_quality]
type = "inference"
function_name = "worker_code_edit"
description = "Evaluates whether worker code edits are correct, compilable, and minimal."

[evaluations.worker_code_quality.evaluators.code_correctness]
type = "llm_judge"
output_type = "float"
optimize = "max"

[evaluations.worker_code_quality.evaluators.code_correctness.variants.claude_judge]
active = true
type = "chat_completion"
model = "claude_sonnet"
system_instructions = "evaluations/worker_code_quality/code_correctness/system_instructions.txt"
json_mode = "strict"

# Check that workers actually use edit_file/write_file tools (not just read).
# LLM judge: tool calls are serialized in chat transcripts, not structured tool_use fields.
[evaluations.worker_code_quality.evaluators.uses_edit_tools]
type = "llm_judge"
output_type = "boolean"
optimize = "max"

[evaluations.worker_code_quality.evaluators.uses_edit_tools.variants.claude_judge]
active = true
type = "chat_completion"
model = "claude_sonnet"
system_instructions = "evaluations/worker_code_quality/uses_edit_tools/system_instructions.txt"
json_mode = "strict"

